name: Weekly Compliance Audit

on:
  schedule:
    - cron: "0 11 * * 1"         # Mondays 06:00 CT (UTC 11:00)
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days to audit (default 7)"
        type: string
        required: false
        default: "7"

concurrency:
  group: weekly-compliance
  cancel-in-progress: true

jobs:
  audit:
    name: TCPA / quiet-hours / consent audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "9.15.0" }
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run compliance audit
        id: audit
        env:
          HIGHLEVEL_API_KEY: ${{ secrets.HIGHLEVEL_API_KEY }}
          HIGHLEVEL_LOCATION_ID: ${{ secrets.HIGHLEVEL_LOCATION_ID }}
          AUDIT_DAYS: ${{ github.event.inputs.days_back || '7' }}
        run: pnpm tsx src/scripts/compliance-audit.ts | tee audit-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 90

      - name: Open incident issue on violation
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '(no report artifact)';
            try { report = fs.readFileSync('audit-report.json', 'utf8'); } catch {}
            const body = [
              'Compliance audit detected one or more critical violations.',
              '',
              'Workflow run: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              '',
              'Last run report:',
              '```json',
              report.slice(0, 50000),
              '```',
              '',
              'Remediation checklist (see /docs/compliance.md):',
              '- [ ] Investigate each finding',
              '- [ ] Patch the process that produced it (not just the record)',
              '- [ ] Verify consent logs are intact',
              '- [ ] Close this issue with a post-mortem comment',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[COMPLIANCE] Weekly audit failed — ' + new Date().toISOString().slice(0,10),
              body,
              labels: ['compliance', 'incident', 'urgent'],
            });
